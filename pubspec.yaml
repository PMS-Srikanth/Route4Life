name: route4life
description: Ambulance driver routing app for hackathon Route4Life.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Maps & Navigation
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.0.0

  # Location
  geolocator: ^11.0.0

  # Networking
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4

  # Deep-link navigation
  url_launcher: ^6.2.0

  # Audio recording + speech-to-text
  record: ^6.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
